<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeliczanie temperatury</title>
</head>
<style>
    body {
        font-family: Arial;
        background-color: #bdbdbd;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container{
        background: rgb(255, 255, 255);
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.33);
        text-align: center;
        width: 300px;

    }

    input {
        padding: 8px;
        width: 80%;
        margin-top: 10px;
        border: 1px solid #5f5f5f;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        padding: 10px 15px;
        background-color: rgb(255, 0, 0);
        color: rgb(255, 255, 255);
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: rgb(197, 0, 0);
    }

    #result{
        margin-top: 20px;
        font-weight: bold;
        color: black;
    }


</style>
<body>
    <div class="container">
        <h2>Fahrenheit -> Celcjusz</h2>

        <form>
            Podaj temperature w °F:<br>
            <input type="number" id="Fahrenheit">
            <button type="button" onclick="convertTemperature()">Przelicz</button>
        </form>
        <p id="result"></p>
    </div>
    <script>
        function convertTemperature(){
            let FahrenheitValue = document.getElementById("Fahrenheit").value;
            let CelciusValue = (FahrenheitValue - 32) * 5 / 9;

            document.getElementById("result").innerHTML = "Temperatura w °C: " + CelciusValue.toFixed(2);
        }

    </script>
</body>
</html>
